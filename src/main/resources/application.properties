ollama.base-url=http://localhost:11434
ollama.model.default=qwen2.5-coder:7b-instruct-q4_K_M

anthropic.base-url=https://api.anthropic.com
anthropic.model=claude-sonnet-4-6
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.version=2023-06-01
anthropic.max-tokens=8096

# Bearer token auth — leave empty to disable
gateway.auth.token=${GATEWAY_AUTH_TOKEN:}

# Prompt char length above which requests are routed to Claude
gateway.routing.complexity-threshold=500

# Reject requests larger than 1 MB to prevent OOM
spring.servlet.multipart.max-request-size=1MB
server.tomcat.max-http-form-post-size=1MB
